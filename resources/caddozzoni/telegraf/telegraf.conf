# ══════════════════════════════════════════════════════════════════
#  Telegraf — Monitoraggio parchi (ACME)
#  Legge lo stream <parco; timestamp; persone> da Kafka e lo instrada:
#    → InfluxDB : TUTTI i parchi, dati grezzi  (cliente 1 - real-time)
#    → MongoDB  : SOLO i parchi selezionati, permanente (cliente 2 - storico)
# ══════════════════════════════════════════════════════════════════

[agent]
  interval = "2s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "2s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

# ──────────────────────────────────────────────────────────────────
# INPUT — Kafka Consumer (stream presenze)
# Un solo topic: il nome del parco è un tag, così un unico schema
# copre tutti i parchi e la selezione del cliente 2 è un filtro sul tag.
# ──────────────────────────────────────────────────────────────────
[[inputs.kafka_consumer]]
  brokers = ["parchi-kafka:29092"]
  topics = ["presenze.parchi"]
  consumer_group = "telegraf-parchi"
  offset = "newest"
  name_override = "presenze"
  data_format = "json_v2"

  [[inputs.kafka_consumer.json_v2]]
    # Il timestamp della tupla è un epoch unix con frazioni di secondo
    # (es. 1549275817.154): lo usiamo come timestamp della misura.
    timestamp_path = "timestamp"
    timestamp_format = "unix"

    [[inputs.kafka_consumer.json_v2.tag]]
      path = "parco"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "persone"
      type = "int"

# ──────────────────────────────────────────────────────────────────
# OUTPUT — InfluxDB v2  (CLIENTE 1: analisi real-time, niente storico)
# Riceve i dati grezzi di TUTTI i parchi. Il bucket ha retention breve
# (vedi docker-compose): al cliente 1 non serve lo storico.
# ──────────────────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://parchi-influxdb:8086"]
  token = "acme-super-secret-token"
  organization = "acme"
  bucket = "parchi"

# ──────────────────────────────────────────────────────────────────
# OUTPUT — MongoDB  (CLIENTE 2: storage permanente, analisi lungo termine)
# Riceve SOLO i parchi scelti dal cliente (tagpass sul tag "parco").
# A differenza della pipeline di riferimento, NON impostiamo alcun TTL:
# i dati vanno conservati permanentemente ("memorizzare tutti i dati").
# Per abbonare altri parchi basta aggiungerli alla lista.
# ──────────────────────────────────────────────────────────────────
[[outputs.mongodb]]
  dsn = "mongodb://admin:adminpassword@parchi-mongodb:27017/?authSource=admin"
  database = "acme"
  granularity = "seconds"
  [outputs.mongodb.tagpass]
    parco = ["Monte Urpinu", "Molentargius", "San Michele"]
