apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: acme
      defaultBucket: parchi
      tlsSkipVerify: true
    secureJsonData:
      token: acme-super-secret-token
    isDefault: true
    editable: true
