# Carica ogni .json in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: 'Smart Farm'
    orgId: 1
    folder: 'Smart Farm'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
