# Routing degli alert -> contact point. Raggruppa per alertname+zona+attuatore
# (una notifica distinta per zona/pompa).
apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-farm
    group_by: ['alertname', 'zone', 'actuator_id']
    group_wait: 10s
    group_interval: 30s
    repeat_interval: 4h

    # (OPZIONALE) Archivio su MongoDB: route figlia verso "mongo-archive" con
    # continue: true (l'alert va sia a Slack sia al webhook Mongo).
    # routes:
    #   - receiver: mongo-archive
    #     continue: true
