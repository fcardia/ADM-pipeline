apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: winery
      defaultBucket: sensors
      tlsSkipVerify: true
    secureJsonData:
      token: winery-super-secret-token
    isDefault: true
    editable: true
