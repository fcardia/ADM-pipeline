# Contact point Slack — provisioning automatico.
# L'URL del webhook NON e' hardcoded: arriva dalla variabile d'ambiente
# SLACK_WEBHOOK_URL (vedi .env.example / docker-compose.yml).
#
# COLLEGAMENTO A SLACK (cosa cambiare):
#   1. Crea una Slack App "from scratch" -> Incoming Webhooks -> ON.
#   2. "Add New Webhook to Workspace" -> scegli il canale (es. #farm-alerts).
#   3. Copia l'URL (https://hooks.slack.com/services/XXX/YYY/ZZZ) in .env:
#         SLACK_WEBHOOK_URL=https://hooks.slack.com/services/...
#   4. Riavvia Grafana:  docker compose up -d grafana
#   Nessuna altra modifica necessaria: la policy sotto instrada gia' qui.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-farm
    receivers:
      - uid: slack_farm_receiver
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          title: '🚨 {{ .CommonLabels.alertname }}{{ if .CommonLabels.zone }} — zona {{ .CommonLabels.zone }}{{ end }}{{ if .CommonLabels.actuator_id }} — {{ .CommonLabels.actuator_id }}{{ end }}'
          text: |-
            {{ range .Alerts }}*Stato:* {{ .Status }}
            {{ .Annotations.summary }}
            *Valore:* {{ .ValueString }}
            {{ end }}
        disableResolveMessage: false

  # ---------------------------------------------------------------------------
  # (OPZIONALE) Storico allarmi su MongoDB tramite webhook.
  # Decommenta questo receiver e aggiungilo alla policy in notification-policies.yaml
  # (campo receiver, oppure come route parallela). Punta a un micro-servizio
  # (vedi PIPELINE.md §10, cartella alert-webhook/) che scrive gli eventi in Mongo.
