# Avvio: docker compose up --build  (usa "up", non "docker run": serve il bind mount ./data)
# CSV generato in ./data/sensor_data.csv | log: docker compose logs -f sensor-simulator

version: "3.8"

networks:
  farm-net:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  grafana-data:

services:
  sensor-simulator:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: farm-sensor-simulator
    command: ["--interval", "1", "--csv-path", "data/sensor_data.csv"]
    depends_on:
      - mosquitto
    networks:
      - farm-net
    volumes:
      - ./data:/app/data
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      TOPIC_AIR_QUALITY: sensors/air_quality
      TOPIC_SOIL_QUALITY: sensors/soil_quality
      TOPIC_MOISTURE: sensors/soil_moisture
      TOPIC_POWER_CONSUMPTION: sensors/power_consumption      
    restart: on-failure
  
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: farm-mosquitto
    networks:
      - farm-net
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  telegraf:
    image: telegraf:1.30
    container_name: farm-telegraf
    networks:
      - farm-net
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy      
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    restart: on-failure

  influxdb:
    image: influxdb:2.7
    container_name: farm-influxdb
    networks:
      - farm-net
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      # Script di init: eseguiti solo al primo avvio (volume vuoto)
      - ./influxdb/init:/docker-entrypoint-initdb.d:ro
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: farm
      DOCKER_INFLUXDB_INIT_BUCKET: farm_raw
      DOCKER_INFLUXDB_INIT_RETENTION: 30d # retention del bucket farm_raw
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: farm-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:11.1.0
    container_name: farm-grafana
    networks:
      - farm-net
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      # Login: admin / <questa password>
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Usate dal provisioning (datasource + alerting)
      INFLUXDB_ORG: ${INFLUXDB_ORG:-farm}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-farm_raw}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-farm-token}
      # Webhook Slack (vuoto = notifiche disattivate)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: on-failure

