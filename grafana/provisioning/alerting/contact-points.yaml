# Contact point Slack. URL webhook da env var SLACK_WEBHOOK_URL (vedi .env.example).
# Setup: crea un Incoming Webhook Slack, mettine l'URL in .env, poi: docker compose up -d grafana
apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-farm
    receivers:
      - uid: slack_farm_receiver
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          title: '🚨 {{ .CommonLabels.alertname }}{{ if .CommonLabels.zone }} — zona {{ .CommonLabels.zone }}{{ end }}{{ if .CommonLabels.actuator_id }} — {{ .CommonLabels.actuator_id }}{{ end }}'
          text: |-
            {{ range .Alerts }}*Stato:* {{ .Status }}
            {{ .Annotations.summary }}
            *Valore:* {{ .ValueString }}
            {{ end }}
        disableResolveMessage: false

  # (OPZIONALE) Storico allarmi su MongoDB via webhook: decommenta e collegalo in
