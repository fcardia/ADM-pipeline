apiVersion: 1

groups:
  - orgId: 1
    name: smart-farm-alerts
    folder: Smart Farm Alerts
    interval: 10s        # frequenza di valutazione (motore backend, always-on)
    rules:

      # ALERT 1 — Qualità aria: pm25_ugm3 > 50 nelle ultime 3 letture/zona (count == 3 => gt 2).
      # range -5m per avere >= 3 letture anche con --interval alto.
      - uid: farm_air_quality_pm25
        title: 'Qualita aria critica (PM2.5 > 50)'
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          category: air_quality
        annotations:
          summary: 'PM2.5 oltre 50 µg/m³ in zona {{ $labels.zone }}: le ultime 3 letture consecutive sono tutte sopra soglia.'
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: farm-influxdb
            model:
              refId: A
              datasource:
                type: influxdb
                uid: farm-influxdb
              query: 'from(bucket: "farm_raw") |> range(start: -5m) |> filter(fn: (r) => r._measurement == "air_quality" and r._field == "pm25_ugm3") |> group(columns: ["zone"]) |> sort(columns: ["_time"]) |> tail(n: 3) |> filter(fn: (r) => r._value > 50.0) |> count()'
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [2]

      # ALERT 2 — Stress idrico: soil_moisture_pct < 20 nelle ultime 2 letture/zona (count == 2 => gt 1).
      - uid: farm_soil_water_stress
        title: 'Stress idrico suolo (umidita < 20%)'
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: soil_moisture
        annotations:
          summary: 'Umidita del suolo sotto il 20% in zona {{ $labels.zone }}: le ultime 2 letture consecutive sono entrambe sotto soglia. Valutare irrigazione.'
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: farm-influxdb
            model:
              refId: A
              datasource:
                type: influxdb
                uid: farm-influxdb
              query: 'from(bucket: "farm_raw") |> range(start: -5m) |> filter(fn: (r) => r._measurement == "soil_moisture" and r._field == "soil_moisture_pct") |> group(columns: ["zone"]) |> sort(columns: ["_time"]) |> tail(n: 2) |> filter(fn: (r) => r._value < 20.0) |> count()'
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [1]

      # ALERT 3 — Sovraccarico pompe: pompa on con power_w > 1125 W (1.5×750 W), basta 1 lettura (gt 0).
      # NB: 750 W è la nominale assunta in sensor_simulator.py, non nella traccia: se cambia, aggiornare 1125.0.
      - uid: farm_power_overload
        title: 'Sovraccarico pompa (power_w > 1.5x nominale)'
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          category: power_consumption
        annotations:
          summary: 'Pompa {{ $labels.actuator_id }} accesa con potenza oltre 1125 W (1.5× nominale): {{ $values.B.Value }} letture di sovraccarico nell''ultimo minuto. Possibile guasto.'
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: farm-influxdb
            model:
              refId: A
              datasource:
                type: influxdb
                uid: farm-influxdb
              query: 'from(bucket: "farm_raw") |> range(start: -1m) |> filter(fn: (r) => r._measurement == "power_consumption" and r._field == "power_w") |> filter(fn: (r) => r.status == "on" and r.actuator_type == "pump" and r._value > 1125.0) |> group(columns: ["actuator_id"]) |> count()'
          - refId: B
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]