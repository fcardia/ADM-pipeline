[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = true

# INPUT — MQTT: sensors/air_quality
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["sensors/air_quality"]
  client_id = "telegraf-air-quality"
  qos = 1
  persistent_session = true
  connection_timeout = "30s"
  name_override = "air_quality"
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    timestamp_path = "timestamp"
    timestamp_format = "2006-01-02T15:04:05.999999Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "zone"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature_c"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "humidity_pct"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "co2_ppm"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pm25_ugm3"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pm10_ugm3"
      type = "float"

# INPUT — MQTT: sensors/soil_quality
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["sensors/soil_quality"]
  client_id = "telegraf-soil-quality"
  qos = 1
  persistent_session = true
  connection_timeout = "30s"
  name_override = "soil_quality"
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    timestamp_path = "timestamp"
    timestamp_format = "2006-01-02T15:04:05.999999Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "zone"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ph"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ec_dsm"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "nitrogen_mgkg"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "phosphorus_mgkg"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "potassium_mgkg"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soil_temperature_c"
      type = "float"

# INPUT — MQTT: sensors/soil_moisture
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["sensors/soil_moisture"]
  client_id = "telegraf-soil-moisture"
  qos = 1
  persistent_session = true
  connection_timeout = "30s"
  name_override = "soil_moisture"
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    timestamp_path = "timestamp"
    timestamp_format = "2006-01-02T15:04:05.999999Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "zone"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soil_moisture_pct"
      type = "float"

# INPUT — MQTT: sensors/power_consumption
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["sensors/power_consumption"]
  client_id = "telegraf-power-consumption"
  qos = 1
  persistent_session = true
  connection_timeout = "30s"
  name_override = "power_consumption"
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    timestamp_path = "timestamp"
    timestamp_format = "2006-01-02T15:04:05.999999Z07:00"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actuator_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actuator_type"

    # zone null per il gateway_controller: optional evita lo scarto del punto
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "zone"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "status"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "power_w"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage_v"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "current_a"
      type = "float"

# OUTPUT — InfluxDB v2, solo dati RAW nel bucket farm_raw
[[outputs.influxdb_v2]]
  urls = ["http://farm-influxdb:8086"]
  token = "farm-token"
  organization = "farm"
  bucket = "farm_raw"
  [outputs.influxdb_v2.tagdrop]
    aggregated = ["true"]
