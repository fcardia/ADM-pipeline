# ══════════════════════════════════════════════════════════════════
#  Telegraf — Linea Imbottigliamento Vino
#  Legge da Kafka → raw su InfluxDB, medie/min su MongoDB
# ══════════════════════════════════════════════════════════════════

[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

# ──────────────────────────────────────────────────────────────────
# INPUT — Kafka Consumer (Riempitrice)
# ──────────────────────────────────────────────────────────────────
[[inputs.kafka_consumer]]
  brokers = ["winery-kafka:29092"]
  topics = ["sensors.riempitrice"]
  consumer_group = "telegraf-riempitrice"
  offset = "newest"
  name_override = "riempitrice"
  data_format = "json_v2"

  [[inputs.kafka_consumer.json_v2]]
    [[inputs.kafka_consumer.json_v2.tag]]
      path = "machine_id"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "temperatura_liquido_C"
      type = "float"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "pressione_circuito_bar"
      type = "float"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "bottiglie_riempite_pz_min"
      type = "float"

# ──────────────────────────────────────────────────────────────────
# INPUT — Kafka Consumer (Tappatrice)
# ──────────────────────────────────────────────────────────────────
[[inputs.kafka_consumer]]
  brokers = ["winery-kafka:29092"]
  topics = ["sensors.tappatrice"]
  consumer_group = "telegraf-tappatrice"
  offset = "newest"
  name_override = "tappatrice"
  data_format = "json_v2"

  [[inputs.kafka_consumer.json_v2]]
    [[inputs.kafka_consumer.json_v2.tag]]
      path = "machine_id"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "forza_tappatura_N"
      type = "float"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "vibrazione_motore_mm_s"
      type = "float"

    [[inputs.kafka_consumer.json_v2.field]]
      path = "bottiglie_tappate_pz_min"
      type = "float"

# ──────────────────────────────────────────────────────────────────
# AGGREGATOR — Media ogni 60s per MongoDB
# ──────────────────────────────────────────────────────────────────
[[aggregators.basicstats]]
  namepass = ["riempitrice", "tappatrice"]
  period = "60s"
  drop_original = false
  stats = ["mean"]

  [aggregators.basicstats.tags]
    aggregated = "true"

# ──────────────────────────────────────────────────────────────────
# OUTPUT — InfluxDB v2 (solo dati RAW)
# ──────────────────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://winery-influxdb:8086"]
  token = "winery-super-secret-token"
  organization = "winery"
  bucket = "sensors"
  [outputs.influxdb_v2.tagdrop]
    aggregated = ["true"]

# ──────────────────────────────────────────────────────────────────
# OUTPUT — MongoDB (solo medie aggregate ogni 60s)
# ──────────────────────────────────────────────────────────────────
[[outputs.mongodb]]
  dsn = "mongodb://admin:adminpassword@winery-mongodb:27017/?authSource=admin"
  database = "winery"
  granularity = "seconds"
  ttl = "720h"
  [outputs.mongodb.tagpass]
    aggregated = ["true"]
