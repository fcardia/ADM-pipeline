version: "3.8"

networks:
  parchi-net:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
  mongodb-data:

services:

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: parchi-zookeeper
    networks:
      - parchi-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 && echo ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # KAFKA — backbone dello stream presenze
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: parchi-kafka
    networks:
      - parchi-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: parchi-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://parchi-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 && echo ok"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 30s

  # ─────────────────────────────────────────
  # KAFDROP — UI per Kafka
  # ─────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: parchi-kafdrop
    networks:
      - parchi-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: parchi-kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    restart: on-failure

  # ─────────────────────────────────────────
  # INFLUXDB — CLIENTE 1 (real-time, storico breve)
  # Retention 24h: al cliente 1 non serve lo storico.
  # ─────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: parchi-influxdb
    networks:
      - parchi-net
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: acme
      DOCKER_INFLUXDB_INIT_BUCKET: parchi
      DOCKER_INFLUXDB_INIT_RETENTION: 24h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: acme-super-secret-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # MONGODB — CLIENTE 2 (storage permanente parchi selezionati)
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: parchi-mongodb
    networks:
      - parchi-net
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: acme
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # TELEGRAF — consumer Kafka + router verso i due sink
  # ─────────────────────────────────────────
  telegraf:
    image: telegraf:1.30
    container_name: parchi-telegraf
    networks:
      - parchi-net
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    restart: on-failure

  # ─────────────────────────────────────────
  # GRAFANA — interfaccia analisi real-time (cliente 1)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: parchi-grafana
    networks:
      - parchi-net
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: on-failure

  # ─────────────────────────────────────────
  # PRODUCER PYTHON — simulatore stream del Comune di Cagliari
  # ─────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: parchi-producer
    networks:
      - parchi-net
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: parchi-kafka:29092
      TOPIC_PRESENZE: presenze.parchi
      PUBLISH_INTERVAL_SECONDS: "5"
    restart: on-failure
