# Datasource InfluxDB (Flux). Org/token/bucket via env var (vedi docker-compose.yml).
apiVersion: 1

datasources:
  - name: InfluxDB
    uid: farm-influxdb          # referenziato da dashboard e alert rules
    type: influxdb
    access: proxy
    url: http://farm-influxdb:8086   # hostname del servizio nella farm-net
    isDefault: true
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
    editable: true
